version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blog-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    container_name: blog-api
    ports:
      - "3333:3333"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy